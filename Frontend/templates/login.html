<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    {% load bootstrap5 %}
    {% bootstrap_css %}
    {% bootstrap_javascript %}
</head>
<body>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">

                <div class="card shadow p-4">
                    <h2 class="mb-4 text-center">Login</h2>

                    <form action="" method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="exampleInputEmail1" class="form-label">Username</label>
                            <input type="text" class="form-control bg-secondary text-light" name="username" id="exampleInputEmail1" aria-describedby="emailHelp" required>
                        </div>

                        <div class="mb-3">
                            <label for="exampleInputPassword1" class="form-label">Password</label>
                            <input type="password" class="form-control bg-secondary text-light" name="password" id="exampleInputPassword1" required>
                        </div>

                        <p class="text-danger fw-bold">{{ error }}</p>

                        <div class="d-flex justify-content-start">
                            <button type="submit" class="btn btn-primary">Login</button>
                            <a href="/signup/" class="btn btn-outline-success ms-2">Sign Up</a>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
