<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    {% load bootstrap5 %}
    {% bootstrap_css %}
    {% bootstrap_javascript %}
</head>
<body>

    <a href="/" class="btn btn-danger m-3">Cancel</a>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">

                <div class="card shadow p-4">
                    <h2 class="mb-4 text-center">Sign Up</h2>

                    <form action="" method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="firstName" class="form-label">First Name</label>
                            <input type="text" class="form-control bg-secondary text-light" name="first_name" id="firstName" required>
                        </div>

                        <div class="mb-3">
                            <label for="lastName" class="form-label">Last Name</label>
                            <input type="text" class="form-control bg-secondary text-light" name="last_name" id="lastName" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control bg-secondary text-light" name="email" id="email" required>
                        </div>

                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control bg-secondary text-light" name="username" id="username" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control bg-secondary text-light" name="password" id="password" required>
                        </div>

                        <p class="text-danger fw-bold">{{ error }}</p>

                        <button type="submit" class="btn btn-success">Sign Up</button>
                    </form>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
